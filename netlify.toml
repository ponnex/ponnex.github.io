[build]
  command = "npm run generate"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "22"
  # Force Nitro's static preset; otherwise Netlify auto-detection switches to
  # the `netlify` preset and writes output outside .output/public.
  NITRO_PRESET = "static"

# Every route is prerendered to static HTML (ssr: true + nitro prerender), and
# existing files always win over this rule — so Netlify serves real pages
# directly. This non-forced catch-all therefore only fires for genuinely missing
# paths: serve the 404 page with a real 404 status (not index.html/200, which
# made every dead URL a "soft 404" — indexable duplicate homepage content). The
# 404.html SPA shell hydrates and the client router renders the in-app
# "not found" view for the requested path.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Baseline security headers. Hygiene rather than a ranking factor — HTTPS is
# already enforced by Netlify. No CSP on purpose: the page ships an inline
# theme script + inline critical CSS and the contact form POSTs to Web3Forms,
# so a strict CSP would need hashes/allowlists and risks breaking those.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"

# Long-cache immutable build assets (content-hashed filenames).
[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
