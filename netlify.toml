[build]
  command = "npm run generate"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "22"
  # Force Nitro's static preset; otherwise Netlify auto-detection switches to
  # the `netlify` preset and writes output outside .output/public.
  NITRO_PRESET = "static"

# Routes are prerendered to static HTML (ssr: true + nitro prerender), so
# Netlify serves the matching file directly. This non-forced catch-all only
# fires for paths with no prerendered file, letting the client router resolve
# them (SPA fallback). Existing files always win over this rule.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
